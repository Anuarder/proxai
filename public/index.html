<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxai</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #111115;
      --bg-tertiary: #18181e;
      --bg-input: #1a1a22;
      --border: #2a2a35;
      --border-focus: #4a4a5a;
      --text-primary: #e8e8ed;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent: #00d4aa;
      --accent-dim: #00d4aa22;
      --accent-glow: #00d4aa40;
      --user-bg: #1a1a2e;
      --assistant-bg: #111118;
      --error: #ff4466;
      --error-dim: #ff446620;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: var(--accent);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .logo span {
      color: var(--text-muted);
      font-weight: 400;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .session-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-tertiary);
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      display: none;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-badge.visible { display: block; }

    select, input[type="password"] {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    select { min-width: 140px; cursor: pointer; }
    input[type="password"] { width: 160px; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-state .icon {
      font-size: 32px;
      opacity: 0.3;
    }

    .empty-state code {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .msg {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 20px;
      border-radius: 6px;
      line-height: 1.65;
      font-size: 14px;
      animation: msg-in 0.2s ease-out;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      background: var(--user-bg);
      border-left: 3px solid var(--accent);
    }

    .msg.assistant {
      background: var(--assistant-bg);
      border-left: 3px solid var(--border);
      font-family: var(--mono);
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg .role-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .msg.user .role-label { color: var(--accent); }
    .msg.assistant .role-label { color: var(--text-muted); }

    .msg.error {
      background: var(--error-dim);
      border-left: 3px solid var(--error);
      color: var(--error);
      font-family: var(--mono);
      font-size: 13px;
    }

    .msg .cursor {
      display: inline-block;
      width: 7px;
      height: 15px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Input ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      font-family: var(--sans);
      font-size: 14px;
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 44px;
      max-height: 200px;
      transition: border-color 0.15s;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    textarea::placeholder { color: var(--text-muted); }

    button.send {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 6px;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    button.send:hover { filter: brightness(1.1); box-shadow: 0 0 12px var(--accent-glow); }
    button.send:active { transform: scale(0.97); }
    button.send:disabled { opacity: 0.4; cursor: not-allowed; filter: none; box-shadow: none; }

    .input-hint {
      max-width: 780px;
      margin: 6px auto 0;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">proxai <span>/ chat</span></div>
    <div class="session-badge" id="sessionBadge"></div>
    <div class="header-controls">
      <select id="modelSelect">
        <option value="">loading models…</option>
      </select>
      <input type="password" id="tokenInput" value="your-secret-key" placeholder="Bearer token">
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#9671;</div>
      <div>Send a message to start a session</div>
      <div><code>Shift+Enter</code> for newline</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Message…" autofocus></textarea>
      <button class="send" id="sendBtn">Send</button>
    </div>
    <div class="input-hint">enter to send &middot; shift+enter for newline</div>
  </div>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const messagesEl = $('#messages');
    const emptyState = $('#emptyState');
    const input = $('#input');
    const sendBtn = $('#sendBtn');
    const modelSelect = $('#modelSelect');
    const tokenInput = $('#tokenInput');
    const sessionBadge = $('#sessionBadge');

    let sessionId = null;
    let isStreaming = false;

    // ── Auto-resize textarea ──
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    });

    // ── Keyboard handling ──
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Load models ──
    async function loadModels() {
      try {
        const res = await fetch('/v1/models', {
          headers: { 'Authorization': 'Bearer ' + tokenInput.value },
        });
        if (!res.ok) throw new Error('Failed to fetch models');
        const body = await res.json();
        modelSelect.innerHTML = '';
        body.data.forEach((m) => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.id;
          modelSelect.appendChild(opt);
        });
      } catch (err) {
        modelSelect.innerHTML = '<option value="">error loading</option>';
      }
    }

    tokenInput.addEventListener('change', loadModels);
    loadModels();

    // ── Append message bubble ──
    function appendMessage(role, content) {
      if (emptyState) emptyState.remove();
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = '<div class="role-label">' + role + '</div><div class="content"></div>';
      div.querySelector('.content').textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function appendError(text) {
      if (emptyState) emptyState.remove();
      const div = document.createElement('div');
      div.className = 'msg error';
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Send message ──
    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isStreaming) return;

      const model = modelSelect.value;
      if (!model) {
        appendError('No model selected');
        return;
      }

      isStreaming = true;
      sendBtn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      appendMessage('user', text);

      const body = {
        model: model,
        messages: [{ role: 'user', content: text }],
        stream: true,
      };
      if (sessionId) body.session_id = sessionId;

      // Create assistant bubble with cursor
      const assistantDiv = appendMessage('assistant', '');
      const contentEl = assistantDiv.querySelector('.content');
      contentEl.innerHTML = '<span class="cursor"></span>';

      try {
        const res = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + tokenInput.value,
          },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: { message: res.statusText } }));
          throw new Error(err.error?.message || 'Request failed');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data: ')) continue;
            const payload = trimmed.slice(6);
            if (payload === '[DONE]') continue;

            try {
              const data = JSON.parse(payload);

              // Capture session ID from first chunk
              if (data.session_id && !sessionId) {
                sessionId = data.session_id;
                sessionBadge.textContent = 'session: ' + sessionId.slice(0, 12) + '…';
                sessionBadge.classList.add('visible');
              }

              const delta = data.choices?.[0]?.delta?.content;
              if (delta) {
                fullContent += delta;
                contentEl.textContent = fullContent;
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                contentEl.appendChild(cursor);
                messagesEl.scrollTop = messagesEl.scrollHeight;
              }
            } catch {
              // skip malformed chunks
            }
          }
        }

        // Remove cursor after stream ends
        const cursor = contentEl.querySelector('.cursor');
        if (cursor) cursor.remove();

      } catch (err) {
        // Remove empty assistant bubble on error
        assistantDiv.remove();
        appendError(err.message);
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
